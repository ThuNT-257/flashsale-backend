# SERVER
server.port=${SERVER_PORT:8080}

# DATABASE
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sapodb}
spring.datasource.username=${DB_USERNAME:yourusername}
spring.datasource.password=${DB_PASSWORD:yourpassword}

# HIKARI POOL
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.connection-timeout=20000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT CONFIG
jwt.secret=${JWT_SECRET:FLASH_SALE_SAPO_TEST_PLEASE_LET_ME_PASS_LONG_KEY_123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# LOGGING
logging.level.org.springframework.security.web.access.intercept.AuthorizationFilter=DEBUG